<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>BMI Calculator</h1>
    <p class="subtitle">Enter your details to calculate your Body Mass Index (BMI).</p>

    <form id="bmiForm" class="card" autocomplete="off">
      <div class="field">
        <label for="age">Age</label>
        <input id="age" name="age" type="number" min="1" max="120" required placeholder="e.g., 25" />
      </div>

      <div class="field">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="field">
        <label for="height">Height (cm)</label>
        <input id="height" name="height" type="number" min="50" max="250" step="0.1" required placeholder="e.g., 170" />
      </div>

      <div class="field">
        <label for="weight">Weight (kg)</label>
        <input id="weight" name="weight" type="number" min="10" max="300" step="0.1" required placeholder="e.g., 65" />
      </div>

      <button id="calcBtn" type="submit">Calculate BMI</button>

      <section class="result" aria-live="polite">
        <div class="resultRow">
          <span class="label">BMI</span>
          <span class="value" id="bmiValue">—</span>
        </div>
        <div class="resultRow">
          <span class="label">Classification</span>
          <span class="value" id="bmiClass">—</span>
        </div>
      </section>

      <p class="help" id="helpText" role="note">
        BMI = weight(kg) / height(m)^2
      </p>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
